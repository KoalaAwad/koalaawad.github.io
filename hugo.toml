baseURL = 'https://awad.github.io/'
languageCode = 'en-us'
title = 'Awad'
theme = 'hugo-theme-terminal'

[params]
  contentTypeName = "posts"
  themeColor = "blue"
  showMenuItems = 3
  fullWidthTheme = false
  centerTheme = true

[params.logo]
  logoText = "awad.terminal"
  logoHomeLink = "/"

[markup.goldmark.renderer]
  unsafe = true

[menu]
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/posts"
    weight = 1
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects"
    weight = 2
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about"
    weight = 3

